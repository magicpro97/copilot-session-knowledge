name: Retrospective

# Manual-only in Wave 3. Do not add a schedule until retro core
# supports all output modes under CI constraints.
on:
  workflow_dispatch:
    inputs:
      days:
        description: "Lookback window in days (default: 30)"
        type: string
        default: "30"

concurrency:
  group: retro
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  retro:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run retrospective (repo-only mode)
        env:
          DAYS_INPUT: ${{ inputs.days }}
        run: |
          python3 retro.py --mode repo --days "$DAYS_INPUT" --json --no-cache > retro-report.json
          python3 - <<'PY' | tee retro-summary.md
          import json
          from pathlib import Path

          data = json.loads(Path("retro-report.json").read_text())
          print("## Retrospective Summary")
          print(
              f"Grade: {data['grade_emoji']} {data['grade']} "
              f"(score {data['retro_score']})"
          )

          # Score confidence (additive field; absent on older payloads)
          confidence = data.get("score_confidence")
          if confidence:
              confidence_icon = {"high": "✅", "medium": "⚠️", "low": "🔴"}.get(confidence, "ℹ️")
              print(f"Score confidence: {confidence_icon} {confidence}")

          print(f"Mode: {data['mode']} | Generated: {data['generated_at']}")
          print()
          print("### Subscores")
          for section in data.get("available_sections", []):
              score = data.get("subscores", {}).get(section)
              print(f"- {section}: {score}")

          # Summary narrative (additive field)
          summary = data.get("summary")
          if summary:
              print()
              print("### Summary")
              print(summary)

          # Distortion flags (additive field)
          flags = data.get("distortion_flags") or []
          if flags:
              print()
              print("### ⚠️ Score Distortions")
              flag_explanations = {
                  "hook_deny_dry_noise": (
                      "Dry-run/test `deny-dry` entries were excluded from `deny_rate`. "
                      "These are not real enforcement denials — the hook enforcement rate "
                      "may appear higher than in a live session."
                  ),
                  "skills_unverified": (
                      "Skill outcomes exist but verification evidence is missing. "
                      "Confidence is lower until outcomes are verified."
                  ),
              }
              for flag in flags:
                  explanation = flag_explanations.get(flag, flag)
                  print(f"- **{flag}**: {explanation}")

          # Accuracy notes (additive field)
          accuracy_notes = data.get("accuracy_notes")
          if accuracy_notes:
              print()
              print("### Accuracy Notes")
              for note in accuracy_notes:
                  print(f"- {note}")

          # Improvement actions (additive field)
          actions = data.get("improvement_actions") or []
          if actions:
              print()
              print("### Recommended Actions")
              for action in actions:
                  print(f"- {action}")
          PY

      - name: Upload retro artifact
        uses: actions/upload-artifact@v4
        with:
          name: retro-report
          path: |
            retro-report.json
            retro-summary.md
          retention-days: 30

      - name: Write job summary
        run: cat retro-summary.md >> "$GITHUB_STEP_SUMMARY"
