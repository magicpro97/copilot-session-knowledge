name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev tools
        run: pip install "ruff>=0.5"

      - name: Syntax check
        run: python3 scripts/check_syntax.py

      - name: Ruff lint
        run: >
          ruff check
          embed.py scout-config.py scout-status.py
          sync-config.py sync-daemon.py sync-status.py
          migrate.py generate-summary.py
          briefing.py learn.py query-session.py extract-knowledge.py
          build-session-index.py tentacle.py checkpoint-diff.py
          checkpoint-restore.py checkpoint-save.py
          tests/test_browse_search_v2.py
          browse/ hooks/ scripts/

      - name: Ruff format check
        run: >
          ruff format --check
          embed.py scout-config.py scout-status.py
          sync-config.py sync-daemon.py sync-status.py
          migrate.py generate-summary.py
          briefing.py learn.py query-session.py extract-knowledge.py
          build-session-index.py tentacle.py checkpoint-diff.py
          checkpoint-restore.py checkpoint-save.py
          tests/test_browse_search_v2.py
          browse/ hooks/ scripts/

      - name: Run tests
        run: python3 run_all_tests.py

  browse-ui:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: browse-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: browse-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  # E2E tests are gated to manual dispatch only.
  #
  # Reason: visual.spec.ts contains screenshot-comparison tests whose pixel
  # output differs between macOS (local) and Linux (CI runners), so they would
  # produce false negatives on every push. The smoke, shortcuts, and chat specs
  # are behaviorally stable, but bundling them with visual tests makes the
  # whole suite unreliable for always-on use.
  #
  # To run E2E: trigger this workflow manually via the GitHub Actions UI or
  #   gh workflow run ci.yml
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: browse-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: browse-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e
