[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",   # line-too-long — not enforced
    "E741",   # ambiguous-variable-name — legacy
    "E402",   # module-import-not-at-top — ubiquitous due to Windows encoding guard
    "E701",   # multiple-statements-on-one-line-colon — intentional compact style
    "E702",   # multiple-statements-on-one-line-semicolon — intentional compact style
    "E731",   # lambda-assignment — intentional helper pattern
    "F401",   # unused-import — wide blast radius, out of scope
    "F841",   # unused-variable — wide blast radius, out of scope
    "B007",   # unused-loop-control-variable — wide blast radius, out of scope
]

[tool.ruff.lint.per-file-ignores]
# Out-of-scope files with known B905/B904 — narrowing gate to in-scope debt only
"browse/core/projection.py" = ["B905"]
"browse/core/similarity.py" = ["B905"]
"sync-knowledge.py" = ["B904"]
